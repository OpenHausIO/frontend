<div class="describtion text-bg">
	<div class="row"> {{ container.describtion }} </div>
</div>

<div class="entries">
	<div class="entry" 
		*ngFor="let entry of container.entries"
		[ngClass]="{'selected': entry.active, 'text-bg': !entry.active}"
		[routerLink]="entry.destination">

		<div class="row">
			<div class="entry-icon align-self-center">
				<i [class]="entry.icon"></i>
			</div>
			<div class="entry-text align-self-center"> 
				{{ entry.name }} 
			</div>
		</div>
	</div>
</div>
